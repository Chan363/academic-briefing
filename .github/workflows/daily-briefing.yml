name: Daily Academic Briefing

on:
  # 每天8:00 UTC (北京时间16:00)
  # 如果需要北京时间8点，使用 cron: '0 0 * * *'
  # 这里使用UTC 0:00，即北京时间8:00
  schedule:
    - cron: '0 0 * * *'

  # 允许手动触发
  workflow_dispatch:

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run academic briefing
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_USER: ${{ secrets.EMAIL_SMTP_USER }}
          EMAIL_SMTP_PASS: ${{ secrets.EMAIL_SMTP_PASS }}
        run: node index.js

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: briefing-log-${{ github.run_number }}
          path: output/
          retention-days: 30
